<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SvelteFit Elite AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, where, Timestamp, deleteDoc, doc, orderBy } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5JAln13HRfqCo-SvWxrS0wCv6b1bKYG8",
            authDomain: "fitnessjz.firebaseapp.com",
            projectId: "fitnessjz",
            storageBucket: "fitnessjz.firebasestorage.app",
            messagingSenderId: "740422822580",
            appId: "1:740422822580:web:5efe6acaa89b697a71c5e1",
            measurementId: "G-7L6XCFEM4T"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const GEMINI_API_KEY = "AIzaSyAqIAwLbRy8J_TWeMESBF3z_MoWij_LYwA";

        // 状态管理
        const STATE = {
            goals: { cal: 1593, pro: 97, fat: 45, carb: 160 },
            lastPeriodStart: "2026-03-15", // 假设上次起始日
            selectedDate: new Date().toLocaleDateString(),
            currentLogs: []
        };

        // --- 1. 月经周期详细逻辑 ---
        function getCycleInfo() {
            const today = new Date();
            const start = new Date(STATE.lastPeriodStart);
            const diffDays = Math.floor((today - start) / (1000 * 60 * 60 * 24)) % 28;
            
            if (diffDays <= 5) return { name: "行经期", tip: "补铁补血，避免剧烈运动", color: "text-red-500", proMod: 1.1 };
            if (diffDays <= 13) return { name: "滤泡期", tip: "代谢旺盛，燃脂黄金期，建议高强度训练", color: "text-emerald-500", proMod: 1.2 };
            if (diffDays <= 15) return { name: "排卵期", tip: "体温升高，注意补充水分", color: "text-pink-500", proMod: 1.0 };
            return { name: "黄体期", tip: "易水肿，减少钠摄入，增加碳水比例以稳血糖", color: "text-orange-500", proMod: 0.9 };
        }

        // --- 2. 核心监听: 界面 1 日期展开逻辑 ---
        function initApp() {
            const q = query(collection(db, "daily_logs"), orderBy("timestamp", "desc"));

            onSnapshot(q, (snapshot) => {
                const groups = {};
                snapshot.forEach(fbDoc => {
                    const data = fbDoc.data();
                    const dateStr = data.timestamp.toDate().toLocaleDateString();
                    if (!groups[dateStr]) groups[dateStr] = { logs: [], total: { cal:0, pro:0, fat:0, carb:0 } };
                    
                    const log = { id: fbDoc.id, ...data };
                    groups[dateStr].logs.push(log);
                    groups[dateStr].total.cal += Number(data.cal || 0);
                    groups[dateStr].total.pro += Number(data.pro || 0);
                    groups[dateStr].total.fat += Number(data.fat || 0);
                    groups[dateStr].total.carb += Number(data.car || 0);
                });

                renderDashboard(groups[STATE.selectedDate] || { total: { cal:0, pro:0, fat:0, carb:0 } });
                renderHistory(groups);
            });
        }

        // 渲染 Dashboard 看板 (界面 0 & 界面 1 顶部)
        function renderDashboard(dayData) {
            const cycle = getCycleInfo();
            document.getElementById('dash-cycle').innerText = `${cycle.name}: ${cycle.tip}`;
            document.getElementById('dash-cycle').className = `text-[10px] font-black uppercase tracking-widest ${cycle.color}`;
            
            document.getElementById('dash-cal').innerText = Math.round(dayData.total.cal);
            document.getElementById('dash-pro').innerText = Math.round(dayData.total.pro) + "g";
            document.getElementById('dash-fat').innerText = Math.round(dayData.total.fat) + "g";
            document.getElementById('dash-carb').innerText = Math.round(dayData.total.carb) + "g";
            
            // 计算汇总看板 (界面5)
            document.getElementById('summary-status').innerText = dayData.total.cal > STATE.goals.cal ? "热量盈余" : "目标进行中";
        }

        function renderHistory(groups) {
            let html = "";
            Object.keys(groups).forEach(date => {
                const g = groups[date];
                const isOpen = date === STATE.selectedDate;
                html += `
                    <div class="mb-4 bg-white rounded-[2rem] overflow-hidden shadow-sm">
                        <button onclick="window.selectDate('${date}')" class="w-full p-6 flex justify-between items-center bg-slate-50">
                            <span class="font-black text-sm">${date === new Date().toLocaleDateString() ? "TODAY" : date}</span>
                            <span class="text-xs font-bold text-slate-400">${Math.round(g.total.cal)} kcal</span>
                        </button>
                        <div class="${isOpen ? 'block' : 'hidden'} p-4 space-y-2">
                            ${g.logs.map(l => `
                                <div class="flex justify-between items-center p-3 bg-white border border-slate-100 rounded-xl">
                                    <div>
                                        <p class="text-xs font-black uppercase">${l.name}</p>
                                        <p class="text-[9px] text-slate-400">P:${l.pro} F:${l.fat} C:${l.car}</p>
                                    </div>
                                    <button onclick="window.deleteLog('${l.id}')" class="text-[10px] text-red-300 font-bold">DEL</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            });
            document.getElementById('history-list').innerHTML = html;
        }

        window.selectDate = (date) => { STATE.selectedDate = date; initApp(); };

        // --- 3. 增强录入逻辑: 修正识别失败 Bug ---
        window.processEntry = async (type, payload) => {
            document.getElementById('loading').classList.remove('hidden');
            let result = {};
            
            try {
                if (type === 'ai_image' || type === 'ai_text') {
                    const prompt = type === 'ai_image' 
                        ? "分析图中的食物和分量。请务必精准，如涉及补剂（蛋白粉），请按标准品牌规格计算。返回JSON:{\"name\":\"名\",\"cal\":100,\"pro\":20,\"fat\":2,\"car\":5,\"fib\":2}"
                        : `计算食物：${payload.name}，重量：${payload.weight}g，烹饪方式：${payload.cook}。参考最新互联网营养数据库。返回JSON:{"name":"${payload.name}","cal":100,"pro":10,"fat":5,"car":20,"fib":2}`;

                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, payload.image ? { inline_data: { mime_type: "image/jpeg", data: payload.image } } : null].filter(Boolean) }] })
                    });
                    const data = await res.json();
                    const text = data.candidates[0].content.parts[0].text.replace(/```json|```/gi, "").trim();
                    result = JSON.parse(text);
                } else if (type === 'manual_macro') {
                    // 纯宏量元素计算: 1g Pro=4, 1g Carb=4, 1g Fat=9
                    result = {
                        name: payload.name,
                        pro: Number(payload.pro), fat: Number(payload.fat), car: Number(payload.car),
                        cal: (payload.pro * 4) + (payload.car * 4) + (payload.fat * 9)
                    };
                }

                await addDoc(collection(db, "daily_logs"), { ...result, timestamp: Timestamp.now() });
                window.showTab('home');
            } catch (e) {
                console.error(e);
                alert("识别失败，请检查网络或Key额度。已自动尝试保底录入。");
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        };

        // --- 4. 界面四: 运动与休息日 ---
        window.saveWorkOut = async () => {
            const type = document.getElementById('ex-type').value;
            const isRest = document.getElementById('is-rest').checked;
            const burn = isRest ? 0 : document.getElementById('ex-burn').value;
            
            await addDoc(collection(db, "daily_logs"), {
                name: isRest ? "🔥 休息日" : `🏋️ ${type}`,
                cal: -Number(burn), // 负数代表消耗
                pro:0, fat:0, car:0,
                timestamp: Timestamp.now()
            });
            window.showTab('home');
        };

        window.deleteLog = async (id) => { if(confirm("删除此记录?")) await deleteDoc(doc(db, "daily_logs", id)); };
        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
        };
        
        window.handleImage = (file) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => window.processEntry('ai_image', { image: reader.result.split(',')[1] });
        };

        window.onload = () => { initApp(); };
    </script>
</head>
<body class="bg-[#F2F2F7] text-slate-900 pb-32">

    <div id="loading" class="hidden fixed inset-0 z-50 bg-black/60 backdrop-blur flex items-center justify-center text-white font-black italic tracking-widest">ANALYZING...</div>

    <main class="max-w-md mx-auto p-6">
        
        <section id="tab-dash" class="tab-content space-y-6">
            <header class="flex justify-between items-center pt-8">
                <h1 class="text-3xl font-black italic tracking-tighter uppercase">Overview</h1>
                <div class="w-10 h-10 bg-black rounded-full"></div>
            </header>

            <div class="bg-white p-8 rounded-[3rem] shadow-sm space-y-6">
                <p id="dash-cycle" class="text-[10px] font-black uppercase tracking-widest"></p>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-50 p-6 rounded-[2rem]">
                        <p class="text-[8px] font-bold text-slate-400 uppercase">Intake</p>
                        <p class="text-2xl font-black"><span id="dash-cal">0</span> <span class="text-[10px] opacity-30">kcal</span></p>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-[2rem]">
                        <p class="text-[8px] font-bold text-slate-400 uppercase">Status</p>
                        <p id="summary-status" class="text-xs font-black uppercase mt-1">Checking...</p>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-2 text-center border-t pt-6">
                    <div><p class="text-[8px] font-bold text-slate-400 uppercase mb-1">P</p><p id="dash-pro" class="font-black text-sm text-blue-500">0g</p></div>
                    <div><p class="text-[8px] font-bold text-slate-400 uppercase mb-1">F</p><p id="dash-fat" class="font-black text-sm text-orange-500">0g</p></div>
                    <div><p class="text-[8px] font-bold text-slate-400 uppercase mb-1">C</p><p id="dash-carb" class="font-black text-sm text-emerald-500">0g</p></div>
                </div>
            </div>
        </section>

        <section id="tab-home" class="tab-content hidden space-y-4">
            <h2 class="text-2xl font-black italic uppercase">History Logs</h2>
            <div id="history-list"></div>
        </section>

        <section id="tab-add" class="tab-content hidden space-y-4">
            <h2 class="text-2xl font-black italic uppercase">Log Mode</h2>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="document.getElementById('cameraInput').click()" class="bg-white p-8 rounded-[2rem] shadow-sm flex flex-col items-center">
                    <span class="text-2xl mb-2">📸</span>
                    <span class="text-[10px] font-black uppercase">AI Vision</span>
                </button>
                <button onclick="showTab('add-manual-macro')" class="bg-white p-8 rounded-[2rem] shadow-sm flex flex-col items-center">
                    <span class="text-2xl mb-2">⚖️</span>
                    <span class="text-[10px] font-black uppercase">By Macros</span>
                </button>
            </div>

            <div class="bg-white p-8 rounded-[3rem] space-y-4 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase text-center">Smart Text Input (With Cook Mode)</p>
                <input id="in-name" type="text" placeholder="食物: 蛋白粉 / 煎牛肉" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm">
                <input id="in-weight" type="number" placeholder="重量 (g)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm">
                <select id="in-cook" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm text-slate-400">
                    <option value="生重/粉末">生重 / 粉末 (如蛋白粉)</option>
                    <option value="油煎">油煎 / 炒</option>
                    <option value="清蒸/水煮">清蒸 / 水煮</option>
                </select>
                <button onclick="window.processEntry('ai_text', {name: document.getElementById('in-name').value, weight: document.getElementById('in-weight').value, cook: document.getElementById('in-cook').value})" class="w-full bg-black text-white p-5 rounded-2xl font-black uppercase text-xs tracking-widest">精准计算</button>
            </div>
        </section>

        <section id="tab-add-manual-macro" class="tab-content hidden space-y-4">
            <div class="bg-white p-8 rounded-[3rem] space-y-4 shadow-sm">
                <h3 class="text-center font-black uppercase text-[10px]">Manual Macros</h3>
                <input id="ma-name" type="text" placeholder="食物名称" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm">
                <div class="grid grid-cols-3 gap-2">
                    <input id="ma-pro" type="number" placeholder="P" class="p-4 bg-slate-50 rounded-2xl text-center font-bold text-sm">
                    <input id="ma-fat" type="number" placeholder="F" class="p-4 bg-slate-50 rounded-2xl text-center font-bold text-sm">
                    <input id="ma-car" type="number" placeholder="C" class="p-4 bg-slate-50 rounded-2xl text-center font-bold text-sm">
                </div>
                <button onclick="window.processEntry('manual_macro', {name: document.getElementById('ma-name').value, pro: document.getElementById('ma-pro').value, fat: document.getElementById('ma-fat').value, car: document.getElementById('ma-car').value})" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black uppercase text-xs">直接存入</button>
                <button onclick="showTab('add')" class="w-full text-[10px] font-bold text-slate-300 uppercase">Back</button>
            </div>
        </section>

        <section id="tab-health" class="tab-content hidden space-y-6">
            <h2 class="text-2xl font-black italic uppercase">Activity</h2>
            <div class="bg-white p-8 rounded-[3rem] space-y-6">
                <div class="flex items-center justify-between">
                    <label class="font-black text-xs uppercase">今日休息日?</label>
                    <input type="checkbox" id="is-rest" class="w-6 h-6">
                </div>
                <div class="space-y-4 border-t pt-4">
                    <select id="ex-type" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm">
                        <option value="力量训练 (高强度)">力量训练 (高强度)</option>
                        <option value="有氧运动 (慢跑/游泳)">有氧运动 (慢跑/游泳)</option>
                        <option value="HIIT">HIIT</option>
                    </select>
                    <input id="ex-burn" type="number" placeholder="预估消耗 (kcal)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm">
                    <button onclick="window.saveWorkOut()" class="w-full bg-red-500 text-white p-5 rounded-2xl font-black uppercase text-xs">记录运动</button>
                </div>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-8 left-6 right-6 h-20 bg-white/90 backdrop-blur-xl rounded-full shadow-2xl flex items-center justify-around px-4 z-40 border border-white/50">
        <button onclick="showTab('dash')" class="p-4">📊</button>
        <button onclick="showTab('home')" class="p-4">📅</button>
        <button onclick="showTab('add')" class="p-4 bg-black text-white rounded-full w-12 h-12 flex items-center justify-center shadow-lg">➕</button>
        <button onclick="showTab('health')" class="p-4">🏃</button>
        <button onclick="showTab('dash')" class="p-4 opacity-30">⚙️</button>
    </nav>

    <input type="file" id="cameraInput" accept="image/*" capture="camera" class="hidden" onchange="window.handleImage(this.files[0])">
</body>
</html>
