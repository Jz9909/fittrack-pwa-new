<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SvelteFit Ultra AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, where, Timestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5JAln13HRfqCo-SvWxrS0wCv6b1bKYG8",
            authDomain: "fitnessjz.firebaseapp.com",
            projectId: "fitnessjz",
            storageBucket: "fitnessjz.firebasestorage.app",
            messagingSenderId: "740422822580",
            appId: "1:740422822580:web:5efe6acaa89b697a71c5e1",
            measurementId: "G-7L6XCFEM4T"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const GEMINI_API_KEY = "AIzaSyAqIAwLbRy8J_TWeMESBF3z_MoWij_LYwA";

        const GOALS = { baseCal: 1593, targetPro: 97, targetCarb: 160, targetFib: 25, targetFat: 50 };

        // --- 界面 1: 实时监听 & 删除功能 ---
        function initApp() {
            const startOfDay = new Date();
            startOfDay.setHours(0,0,0,0);
            const q = query(collection(db, "daily_logs"), where("timestamp", ">=", Timestamp.fromDate(startOfDay)));

            onSnapshot(q, (snapshot) => {
                let consumed = { cal: 0, pro: 0, carb: 0, fib: 0, fat: 0 };
                let listHtml = "";
                snapshot.forEach((fbDoc) => {
                    const d = fbDoc.data();
                    const id = fbDoc.id;
                    consumed.cal += Number(d.cal || 0);
                    consumed.pro += Number(d.pro || 0);
                    consumed.carb += Number(d.car || 0);
                    consumed.fat += Number(d.fat || 0);
                    
                    listHtml += `
                        <div class="bg-slate-50 p-4 rounded-2xl mb-3">
                            <div class="flex justify-between items-start mb-2">
                                <span class="font-black text-sm uppercase">${d.name}</span>
                                <button onclick="window.deleteLog('${id}')" class="text-red-400 text-xs font-bold">REMOVE</button>
                            </div>
                            <div class="grid grid-cols-4 gap-1 text-[9px] font-bold text-slate-400 uppercase">
                                <div>CAL: <span class="text-black">${d.cal}</span></div>
                                <div>PRO: <span class="text-blue-500">${d.pro}g</span></div>
                                <div>CARB: <span class="text-emerald-500">${d.car}g</span></div>
                                <div>FAT: <span class="text-orange-500">${d.fat || 0}g</span></div>
                            </div>
                        </div>`;
                });
                document.getElementById('remain-cal').innerText = Math.max(0, GOALS.baseCal - consumed.cal);
                document.getElementById('food-history').innerHTML = listHtml || "<p class='text-center py-10 text-slate-300 font-bold italic'>STAY HUNGRY...</p>";
                
                // 界面 5 逻辑：剩余宏量元素
                document.getElementById('gap-pro').innerText = Math.max(0, GOALS.targetPro - consumed.pro).toFixed(1) + "g";
                document.getElementById('gap-carb').innerText = Math.max(0, GOALS.targetCarb - consumed.carb).toFixed(1) + "g";
            });
        }

        window.deleteLog = async (id) => {
            if(confirm("确定删除这条记录吗？")) await deleteDoc(doc(db, "daily_logs", id));
        };

        // --- 界面 2: 体积估算功能 ---
        window.processIntake = async (name, weight, isImage = false, base64 = null, sizeDesc = null) => {
            document.getElementById('loading').classList.remove('hidden');
            let prompt = "";
            
            if(sizeDesc) {
                // 如果用户提供了体积描述（拳头/手掌）
                prompt = `计算食物：${name}，大小约：${sizeDesc}。请基于常识（如一个中等苹果约150g，一拳头米饭约150g）估算营养。只返回JSON:{"name":"${name}","cal":100,"pro":5,"car":20,"fat":3,"fib":2}`;
            } else if (isImage) {
                prompt = "分析图中食物营养，只返回JSON:{\"name\":\"食物名\",\"cal\":100,\"pro\":10,\"car\":10,\"fat\":5,\"fib\":2}";
            } else {
                prompt = `计算${weight}g${name}的营养。只返回JSON:{"name":"${name}","cal":100,"pro":10,"car":20,"fat":5,"fib":5}`;
            }

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, isImage ? { inline_data: { mime_type: "image/jpeg", data: base64 } } : null].filter(Boolean) }] })
                });
                const data = await res.json();
                const aiData = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/gi, ""));
                await addDoc(collection(db, "daily_logs"), { ...aiData, timestamp: Timestamp.now() });
                window.showTab('home');
            } catch (e) { alert("AI识别失败，请尝试手动录入。"); }
            document.getElementById('loading').classList.add('hidden');
        };

        // --- 界面 3: 腰臀比 & 测量逻辑 ---
        window.updateStats = () => {
            const w = parseFloat(document.getElementById('in-weight').value) || 0;
            const waist = parseFloat(document.getElementById('in-waist').value) || 0;
            const hip = parseFloat(document.getElementById('in-hip').value) || 0;
            
            // 1. BMI 计算
            const bmi = (w / (1.65 * 1.65)).toFixed(1);
            document.getElementById('bmi-res').innerText = bmi;

            // 2. 腰臀比 (WHR) 计算
            if (waist > 0 && hip > 0) {
                const whr = (waist / hip).toFixed(2);
                document.getElementById('whr-res').innerText = whr;
                
                // Benchmark: 女性健康标准 < 0.85
                const status = whr <= 0.85 ? "✅ 标准 (健康)" : "⚠️ 超标 (向心性肥胖风险)";
                document.getElementById('whr-status').innerText = status;
                document.getElementById('whr-advice').innerText = whr > 0.85 ? "BMI 可能正常，但腰臀比提示内脏脂肪较高，建议加强抗阻训练。" : "围度比例非常健康，继续保持！";
            }
        };

        // --- 界面 4: 健康同步模拟 ---
        window.syncHealth = () => {
            const manualBurn = prompt("手动输入今日 Apple Health 消耗的热量 (kcal):", "2400");
            if(manualBurn) {
                document.getElementById('health-burn').innerText = manualBurn;
                // 计算赤字逻辑 (简化)
                const intake = 1593 - parseInt(document.getElementById('remain-cal').innerText);
                document.getElementById('deficit-res').innerText = (manualBurn - intake) + " kcal";
            }
        };

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
        };

        window.onload = () => { initApp(); };
    </script>
</head>
<body class="bg-[#F2F2F7] text-slate-900 pb-40">

    <div id="loading" class="hidden fixed inset-0 z-50 bg-white/90 backdrop-blur flex items-center justify-center font-black italic">AI ANALYZING...</div>

    <main class="max-w-md mx-auto p-6 pt-12">
        
        <section id="tab-home" class="tab-content space-y-6">
            <header class="flex justify-between items-center">
                <h1 class="text-3xl font-black italic uppercase tracking-tighter">SvelteFit.</h1>
                <div class="text-[10px] font-black bg-white px-3 py-1 rounded-full shadow-sm">LUTEAL PHASE</div>
            </header>

            <div class="bg-black text-white p-8 rounded-[3rem] shadow-2xl">
                <p class="text-[10px] font-bold opacity-40 uppercase tracking-widest mb-1">Calories Remaining</p>
                <div class="flex items-baseline gap-1">
                    <span id="remain-cal" class="text-7xl font-black tracking-tighter">1593</span>
                    <span class="opacity-30 font-bold text-xs uppercase">kcal</span>
                </div>
                <div class="mt-8 grid grid-cols-2 gap-4 border-t border-white/10 pt-6">
                    <div><p class="text-[8px] opacity-40 font-bold uppercase mb-1">Need Protein</p><p id="gap-pro" class="font-black text-lg text-blue-400">0g</p></div>
                    <div><p class="text-[8px] opacity-40 font-bold uppercase mb-1">Need Carb</p><p id="gap-carb" class="font-black text-lg text-emerald-400">0g</p></div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 italic">Recent Logs (Swipe to manage)</p>
                <div id="food-history"></div>
            </div>
        </section>

        <section id="tab-add" class="tab-content hidden space-y-4">
            <h2 class="text-2xl font-black italic uppercase px-2">Add Intake</h2>
            <div class="bg-white p-8 rounded-[3rem] space-y-6">
                <div class="space-y-4">
                    <p class="text-[10px] font-black text-slate-400 uppercase text-center tracking-widest">体积估算模式</p>
                    <input id="v-name" type="text" placeholder="什么食物？(如: 意面)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm">
                    <select id="v-size" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm text-slate-500">
                        <option value="一拳头大小">一拳头大小</option>
                        <option value="一个手掌大小">一个手掌大小</option>
                        <option value="一个中等大小">一个中等大小 (如苹果/鸡蛋)</option>
                        <option value="一小碗">一小碗</option>
                    </select>
                    <button onclick="window.processIntake(document.getElementById('v-name').value, null, false, null, document.getElementById('v-size').value)" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black uppercase text-xs">体积估算并保存</button>
                </div>
                <div class="border-t border-slate-50 pt-6 space-y-4">
                    <p class="text-[10px] font-black text-slate-400 uppercase text-center tracking-widest">传统重量录入</p>
                    <input id="m-name" type="text" placeholder="食物名称" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm">
                    <input id="m-weight" type="number" placeholder="重量 (g)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm">
                    <button onclick="window.processIntake(document.getElementById('m-name').value, document.getElementById('m-weight').value)" class="w-full bg-black text-white p-5 rounded-2xl font-black uppercase text-xs">按重量保存</button>
                </div>
            </div>
        </section>

        <section id="tab-stats" class="tab-content hidden space-y-4">
            <h2 class="text-2xl font-black italic uppercase px-2">Body Metric</h2>
            <div class="bg-white p-8 rounded-[3rem] space-y-5 shadow-sm">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 uppercase">Weight (kg)</label><input id="in-weight" type="number" value="60.8" class="w-full p-3 bg-slate-50 rounded-xl font-black outline-none"></div>
                    <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 uppercase">Waist (cm)</label><input id="in-waist" type="number" placeholder="腰围" class="w-full p-3 bg-slate-50 rounded-xl font-black outline-none" oninput="updateStats()"></div>
                    <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 uppercase">Hip (cm)</label><input id="in-hip" type="number" placeholder="臀围" class="w-full p-3 bg-slate-50 rounded-xl font-black outline-none" oninput="updateStats()"></div>
                    <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 uppercase">Shoulder</label><input type="number" placeholder="肩宽" class="w-full p-3 bg-slate-50 rounded-xl font-black outline-none"></div>
                </div>

                <div class="bg-slate-900 text-white p-6 rounded-[2rem] space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] font-bold opacity-50 uppercase">BMI Status</span>
                        <span id="bmi-res" class="text-xl font-black">22.3</span>
                    </div>
                    <div class="flex justify-between items-center border-t border-white/10 pt-4">
                        <div class="space-y-1">
                            <span class="text-[10px] font-bold opacity-50 uppercase">WHR (腰臀比)</span>
                            <p id="whr-res" class="text-2xl font-black tracking-tighter text-blue-400">0.00</p>
                        </div>
                        <div class="text-right">
                            <p id="whr-status" class="text-[10px] font-bold uppercase">等待输入...</p>
                        </div>
                    </div>
                    <p id="whr-advice" class="text-[10px] text-slate-400 leading-relaxed italic border-t border-white/10 pt-4">输入腰臀围以获取分析...</p>
                </div>
            </div>
        </section>

        <section id="tab-health" class="tab-content hidden space-y-4">
            <h2 class="text-2xl font-black italic uppercase px-2">Energy Balance</h2>
            <div class="bg-white p-10 rounded-[3.5rem] text-center space-y-8 shadow-sm">
                <div class="space-y-2">
                    <p id="health-burn" class="text-6xl font-black tracking-tighter">0</p>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Total TDEE (Kcal)</p>
                </div>
                <div class="bg-emerald-50 p-6 rounded-[2rem]">
                    <p id="deficit-res" class="text-3xl font-black text-emerald-600 tracking-tighter">0 kcal</p>
                    <p class="text-[10px] font-black text-emerald-600/50 uppercase">今日热量赤字</p>
                </div>
                <button onclick="syncHealth()" class="w-full py-4 rounded-2xl border-2 border-black font-black uppercase text-[10px] tracking-widest active:bg-black active:text-white transition-all">手动同步健康数据</button>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-10 left-8 right-8 h-20 bg-white/90 backdrop-blur-xl rounded-full shadow-2xl flex items-center justify-around px-4 border border-white/50 z-50">
        <button onclick="showTab('home')" class="p-4">🏠</button>
        <button onclick="showTab('add')" class="p-4">➕</button>
        <button onclick="showTab('stats')" class="p-4">📏</button>
        <button onclick="showTab('health')" class="p-4">❤️</button>
    </nav>
</body>
</html>
