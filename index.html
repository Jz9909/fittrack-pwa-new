<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SvelteFit Ultra Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, where, Timestamp, deleteDoc, doc, orderBy } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5JAln13HRfqCo-SvWxrS0wCv6b1bKYG8",
            authDomain: "fitnessjz.firebaseapp.com",
            projectId: "fitnessjz",
            storageBucket: "fitnessjz.firebasestorage.app",
            messagingSenderId: "740422822580",
            appId: "1:740422822580:web:5efe6acaa89b697a71c5e1",
            measurementId: "G-7L6XCFEM4T"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const GEMINI_API_KEY = "AIzaSyB35ybN859OLj_N3Rc1pC2imSKbzvlSQOE";

        const STATE = {
            goals: { cal: 1593, pro: 97, fat: 45, carb: 160 },
            lastPeriodStart: "2026-03-01", // 这里修改你的经期起始日
            selectedDate: new Date().toLocaleDateString()
        };

        // --- 1. 月经周期算法 ---
        function getCycleInfo() {
            const start = new Date(STATE.lastPeriodStart);
            const today = new Date();
            const dayIdx = Math.floor((today - start) / 86400000) % 28 + 1;
            if (dayIdx <= 5) return { name: "月经期", icon: "🩸", tip: "补铁补血，不宜剧烈运动", color: "bg-red-500", proMod: 1.0 };
            if (dayIdx <= 13) return { name: "卵泡期", icon: "🌱", tip: "代谢高峰！燃脂效率极高，适合举铁", color: "bg-emerald-500", proMod: 1.2 };
            if (dayIdx <= 16) return { name: "排卵期", icon: "🥚", tip: "注意水分补充，代谢稳定", color: "bg-pink-500", proMod: 1.1 };
            return { name: "黄体期", icon: "🍂", tip: "易水肿，多摄入纤维，减少钠盐", color: "bg-orange-500", proMod: 0.9 };
        }

        // --- 2. 核心监听与日期展开 ---
        function initApp() {
            const q = query(collection(db, "daily_logs"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                const groups = {};
                snapshot.forEach(fbDoc => {
                    const data = fbDoc.data();
                    const d = data.timestamp.toDate().toLocaleDateString();
                    if (!groups[d]) groups[d] = { logs: [], total: { cal:0, pro:0, fat:0, car:0 }, burned: 0 };
                    
                    if(data.cal < 0) {
                        groups[d].burned += Math.abs(data.cal);
                    } else {
                        groups[d].logs.push({ id: fbDoc.id, ...data });
                        groups[d].total.cal += Number(data.cal || 0);
                        groups[d].total.pro += Number(data.pro || 0);
                        groups[d].total.fat += Number(data.fat || 0);
                        groups[d].total.car += Number(data.car || 0);
                    }
                });
                renderHistory(groups);
                renderDashboard(groups[new Date().toLocaleDateString()] || { total: { cal:0, pro:0, fat:0, car:0 }, burned: 0 });
            });
        }

        function renderDashboard(today) {
            const cycle = getCycleInfo();
            document.getElementById('dash-cycle').innerText = `${cycle.icon} ${cycle.name}: ${cycle.tip}`;
            document.getElementById('dash-cycle-tag').className = `${cycle.color} text-white px-3 py-1 rounded-full text-[10px] font-black uppercase`;
            document.getElementById('dash-cycle-tag').innerText = cycle.name;
            
            document.getElementById('dash-cal').innerText = Math.round(today.total.cal);
            document.getElementById('dash-pro').innerText = Math.round(today.total.pro) + "g";
            document.getElementById('dash-fat').innerText = Math.round(today.total.fat) + "g";
            document.getElementById('dash-car').innerText = Math.round(today.total.car) + "g";
            
            // 界面4汇总数据
            const tdee = 2480; 
            document.getElementById('summary-deficit').innerText = Math.round(tdee + today.burned - today.total.cal) + " kcal";
        }

        function renderHistory(groups) {
            let html = "";
            Object.keys(groups).forEach(date => {
                const g = groups[date];
                const isSelected = date === STATE.selectedDate;
                html += `
                    <div class="mb-4 bg-white rounded-[2.5rem] overflow-hidden shadow-sm border ${isSelected ? 'border-black' : 'border-transparent'}">
                        <div onclick="window.selectDate('${date}')" class="p-6 flex justify-between items-center cursor-pointer">
                            <span class="font-black text-sm uppercase">${date === new Date().toLocaleDateString() ? 'Today' : date}</span>
                            <span class="text-xs font-bold text-slate-400">${Math.round(g.total.cal)} kcal</span>
                        </div>
                        <div class="${isSelected ? 'block' : 'hidden'} px-6 pb-6 space-y-2 border-t border-slate-50 pt-4">
                            ${g.logs.map(l => `
                                <div class="flex justify-between items-center p-3 bg-slate-50 rounded-2xl">
                                    <div class="flex-1 text-[10px] font-bold uppercase">
                                        <p>${l.name}</p>
                                        <p class="text-[8px] opacity-40">P:${l.pro} F:${l.fat} C:${l.car}</p>
                                    </div>
                                    <span class="font-black text-[10px] mx-3">${l.cal}</span>
                                    <button onclick="window.deleteLog('${l.id}')" class="text-red-300 font-bold text-xs">✕</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            });
            document.getElementById('history-list').innerHTML = html;
        }

        // --- 3. 关键修复：AI 请求逻辑 ---
        window.processIntake = async (mode, data) => {
            document.getElementById('loading').classList.remove('hidden');
            let payload = {};
            try {
                if (mode === 'ai_text' || mode === 'ai_img') {
                    // 使用 v1 稳定版路径
                    const prompt = mode === 'ai_text' 
                        ? `食物:${data.name},重量:${data.weight}g,烹饪:${data.cook}。精准计算营养。返回JSON:{"name":"${data.name}","cal":100,"pro":10,"fat":5,"car":20}`
                        : `分析图中食物分量。返回JSON:{"name":"食物","cal":100,"pro":10,"fat":5,"car":20}`;

                    const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, data.img ? { inline_data: { mime_type: "image/jpeg", data: data.img } } : null].filter(Boolean) }] })
                    });
                    
                    const resJson = await res.json();
                    if(resJson.error) throw new Error(resJson.error.message);
                    
                    const aiRaw = resJson.candidates[0].content.parts[0].text.replace(/```json|```/gi, "").trim();
                    payload = JSON.parse(aiRaw);
                } else if (mode === 'macro') {
                    payload = { name: data.name, pro: data.p, fat: data.f, car: data.c, cal: (data.p*4 + data.f*9 + data.c*4) };
                } else if (mode === 'exercise') {
                    payload = { name: data.name, cal: -Math.abs(data.cal), pro:0, fat:0, car:0 };
                }

                await addDoc(collection(db, "daily_logs"), { ...payload, timestamp: Timestamp.now() });
                window.showTab('dash');
            } catch (e) {
                alert("AI 线路拥堵，已存入保底数据，请稍后刷新。");
                console.error(e);
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        };

        window.selectDate = (date) => { STATE.selectedDate = date; initApp(); };
        window.deleteLog = async (id) => { if(confirm("删除此项？")) await deleteDoc(doc(db, "daily_logs", id)); };
        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
        };

        window.onload = () => { initApp(); };
    </script>
</head>
<body class="bg-[#F2F2F7] text-slate-900 pb-36">

    <div id="loading" class="hidden fixed inset-0 z-[100] bg-white/90 backdrop-blur flex items-center justify-center font-black italic">ANALYZING...</div>

    <main class="max-w-md mx-auto p-6 pt-12">
        
        <section id="tab-dash" class="tab-content space-y-6">
            <header class="flex justify-between items-center">
                <h1 class="text-4xl font-black italic tracking-tighter uppercase">Overview</h1>
                <div id="dash-cycle-tag"></div>
            </header>

            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm flex items-center gap-4">
                <div class="w-10 h-10 bg-slate-50 rounded-2xl flex items-center justify-center text-xl">💡</div>
                <p id="dash-cycle" class="text-[10px] font-black leading-tight"></p>
            </div>

            <div class="bg-black text-white p-10 rounded-[3.5rem] shadow-2xl">
                <p class="text-[10px] font-bold opacity-30 uppercase tracking-widest mb-1 text-center">Calories Intake</p>
                <p id="dash-cal" class="text-7xl font-black tracking-tighter text-center">0</p>
                
                <div class="mt-10 grid grid-cols-3 gap-2 text-center border-t border-white/10 pt-8">
                    <div><p class="text-[8px] opacity-30 font-black uppercase mb-1">PRO</p><p id="dash-pro" class="text-xs font-black text-blue-400">0g</p></div>
                    <div><p class="text-[8px] opacity-30 font-black uppercase mb-1">FAT</p><p id="dash-fat" class="text-xs font-black text-orange-400">0g</p></div>
                    <div><p class="text-[8px] opacity-30 font-black uppercase mb-1">CARB</p><p id="dash-car" class="text-xs font-black text-emerald-400">0g</p></div>
                </div>
            </div>

            <div class="bg-emerald-500 text-white p-8 rounded-[2.5rem] text-center">
                <p class="text-[10px] font-black opacity-60 uppercase mb-1">今日预估赤字 (Deficit)</p>
                <p id="summary-deficit" class="text-3xl font-black italic">Calculating...</p>
            </div>
        </section>

        <section id="tab-home" class="tab-content hidden space-y-4">
            <h2 class="text-2xl font-black italic uppercase px-2">History Logs</h2>
            <div id="history-list"></div>
        </section>

        <section id="tab-add" class="tab-content hidden space-y-4">
            <h2 class="text-2xl font-black italic uppercase px-2">Log Intake</h2>
            <div class="grid grid-cols-2 gap-4">
                <div onclick="document.getElementById('fileIn').click()" class="bg-white p-8 rounded-[2.5rem] border-2 border-dashed border-slate-200 text-center cursor-pointer">
                    <span class="text-3xl">📸</span>
                    <p class="text-[8px] font-black text-slate-400 uppercase mt-2">AI Vision</p>
                </div>
                <div onclick="showTab('add-macro')" class="bg-white p-8 rounded-[2.5rem] text-center cursor-pointer">
                    <span class="text-3xl">⚖️</span>
                    <p class="text-[8px] font-black text-slate-400 uppercase mt-2">Macros</p>
                </div>
            </div>

            <div class="bg-white p-8 rounded-[3rem] space-y-4">
                <p class="text-[10px] font-black text-slate-400 text-center uppercase">Smart Input</p>
                <input id="in-name" type="text" placeholder="食物: 蛋白粉" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm">
                <input id="in-weight" type="number" placeholder="重量 (g)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm">
                <select id="in-cook" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm text-slate-400">
                    <option value="生重/干粉">生重 / 干粉 (最精准)</option>
                    <option value="水煮">水煮</option>
                    <option value="油炸">油炸 / 炒</option>
                </select>
                <button onclick="window.processIntake('ai_text', {name: document.getElementById('in-name').value, weight: document.getElementById('in-weight').value, cook: document.getElementById('in-cook').value})" class="w-full bg-black text-white p-5 rounded-2xl font-black uppercase text-xs tracking-widest">AI 计算</button>
            </div>
        </section>

        <section id="tab-add-macro" class="tab-content hidden space-y-4">
            <div class="bg-white p-8 rounded-[3rem] space-y-4">
                <input id="ma-name" type="text" placeholder="食物名称" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm">
                <div class="grid grid-cols-3 gap-2">
                    <input id="ma-p" type="number" placeholder="P" class="p-4 bg-slate-50 rounded-2xl text-center font-bold">
                    <input id="ma-f" type="number" placeholder="F" class="p-4 bg-slate-50 rounded-2xl text-center font-bold">
                    <input id="ma-c" type="number" placeholder="C" class="p-4 bg-slate-50 rounded-2xl text-center font-bold">
                </div>
                <button onclick="window.processIntake('macro', {name: document.getElementById('ma-name').value, p: document.getElementById('ma-p').value, f: document.getElementById('ma-f').value, c: document.getElementById('ma-c').value})" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black uppercase text-xs">录入数据</button>
                <button onclick="showTab('add')" class="w-full text-[10px] font-bold text-slate-300">BACK</button>
            </div>
        </section>

        <section id="tab-health" class="tab-content hidden space-y-4">
            <h2 class="text-2xl font-black italic uppercase px-2">Activity</h2>
            <div class="bg-white p-8 rounded-[3rem] space-y-4">
                <p class="text-[10px] font-black text-slate-400 text-center uppercase">记录今日消耗</p>
                <input id="ex-name" type="text" placeholder="运动: 力量训练" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm">
                <input id="ex-burn" type="number" placeholder="消耗 (kcal)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm">
                <button onclick="window.processIntake('exercise', {name: document.getElementById('ex-name').value, cal: document.getElementById('ex-burn').value})" class="w-full bg-red-500 text-white p-5 rounded-2xl font-black uppercase text-xs">记录消耗</button>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-8 left-8 right-8 h-20 bg-white/90 backdrop-blur-xl rounded-full shadow-2xl flex items-center justify-around px-4 z-50 border border-white/50">
        <button onclick="showTab('dash')" class="p-4">📊</button>
        <button onclick="showTab('home')" class="p-4">📅</button>
        <button onclick="showTab('add')" class="p-4 bg-black text-white rounded-full w-12 h-12 flex items-center justify-center">➕</button>
        <button onclick="showTab('health')" class="p-4">🏃</button>
    </nav>

    <input type="file" id="fileIn" accept="image/*" capture="camera" class="hidden" onchange="const r=new FileReader();r.readAsDataURL(this.files[0]);r.onload=()=>window.processIntake('ai_img',{img:r.result.split(',')[1]})">
</body>
</html>
