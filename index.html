<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SvelteFit Pro AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, where, Timestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5JAln13HRfqCo-SvWxrS0wCv6b1bKYG8",
            authDomain: "fitnessjz.firebaseapp.com",
            projectId: "fitnessjz",
            storageBucket: "fitnessjz.firebasestorage.app",
            messagingSenderId: "740422822580",
            appId: "1:740422822580:web:5efe6acaa89b697a71c5e1",
            measurementId: "G-7L6XCFEM4T"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const GEMINI_API_KEY = "AIzaSyAqIAwLbRy8J_TWeMESBF3z_MoWij_LYwA";

        const GOALS = { baseCal: 1593, targetPro: 97, targetCarb: 160, targetFib: 25 };

        // --- 功能：实时监听数据并更新界面 1 & 5 ---
        function initApp() {
            const startOfDay = new Date();
            startOfDay.setHours(0,0,0,0);
            const q = query(collection(db, "daily_logs"), where("timestamp", ">=", Timestamp.fromDate(startOfDay)));

            onSnapshot(q, (snapshot) => {
                let consumed = { cal: 0, pro: 0, carb: 0, fib: 0 };
                let listHtml = "";
                snapshot.forEach((doc) => {
                    const d = doc.data();
                    consumed.cal += Number(d.cal || 0);
                    consumed.pro += Number(d.pro || 0);
                    consumed.carb += Number(d.car || 0);
                    consumed.fib += Number(d.fib || 0);
                    listHtml += `<div class="flex justify-between p-3 bg-slate-50 rounded-xl mb-2 text-xs font-bold uppercase">
                        <span>${d.name}</span><span>${d.cal} KCAL</span>
                    </div>`;
                });
                document.getElementById('remain-cal').innerText = Math.max(0, GOALS.baseCal - consumed.cal);
                document.getElementById('food-history').innerHTML = listHtml || "<p class='text-center py-4 text-slate-300 uppercase text-[10px] tracking-widest'>Wait for log</p>";
                document.getElementById('gap-pro').innerText = Math.max(0, GOALS.targetPro - consumed.pro).toFixed(1) + "g";
                document.getElementById('gap-carb').innerText = Math.max(0, GOALS.targetCarb - consumed.carb).toFixed(1) + "g";
                document.getElementById('gap-fib').innerText = Math.max(0, GOALS.targetFib - consumed.fib).toFixed(1) + "g";
            });
        }

        // --- 功能：AI 分析与保存 (界面 1 & 2) ---
        window.processIntake = async (name, weight, isImage = false, base64 = null) => {
            document.getElementById('loading').classList.remove('hidden');
            let result = {
                name: name || "识别食物",
                cal: Math.round((weight || 100) * 1.5),
                pro: Math.round((weight || 100) * 0.1), car: Math.round((weight || 100) * 0.2), fib: Math.round((weight || 100) * 0.02)
            };

            try {
                const prompt = isImage 
                    ? "分析图中食物，返回JSON格式:{\"name\":\"食物名\",\"cal\":100,\"pro\":10,\"car\":10,\"fib\":2}" 
                    : `计算${weight}g${name}的营养，返回JSON:{"name":"${name}","cal":100,"pro":10,"car":20,"fib":5}`;

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, isImage ? { inline_data: { mime_type: "image/jpeg", data: base64 } } : null].filter(Boolean) }] })
                });
                const data = await res.json();
                const aiData = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/gi, ""));
                result = { ...result, ...aiData };
            } catch (e) { console.warn("Using fallback estimation"); }

            await addDoc(collection(db, "daily_logs"), { ...result, timestamp: Timestamp.now() });
            window.showTab('home');
            document.getElementById('loading').classList.add('hidden');
        };

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
        };

        window.handleImage = (file) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => window.processIntake(null, null, true, reader.result.split(',')[1]);
        };

        window.onload = () => { initApp(); };
    </script>

    <style>
        body { font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-content { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#F2F2F7] text-slate-900 pb-32">

    <div id="loading" class="hidden fixed inset-0 z-50 bg-white/80 backdrop-blur flex items-center justify-center font-black italic">AI PROCESSING...</div>

    <main class="max-w-md mx-auto p-6 pt-12">
        <section id="tab-home" class="tab-content space-y-6">
            <header class="flex justify-between items-end">
                <h1 class="text-3xl font-black italic uppercase tracking-tighter text-black">SvelteFit.</h1>
                <span class="bg-pink-100 text-pink-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase">排卵期-多摄入纤维</span>
            </header>

            <div class="bg-white p-8 rounded-[3rem] shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">距离今日目标还剩</p>
                <div class="flex items-baseline gap-1">
                    <span id="remain-cal" class="text-7xl font-black tracking-tighter">1593</span>
                    <span class="text-slate-300 font-bold text-xs uppercase">kcal</span>
                </div>
                <div class="mt-8 grid grid-cols-3 gap-2 border-t pt-6 border-slate-50">
                    <div class="text-center"><p class="text-[8px] text-slate-400 font-bold uppercase mb-1">还需蛋白</p><p id="gap-pro" class="font-black text-xs text-blue-600">0g</p></div>
                    <div class="text-center"><p class="text-[8px] text-slate-400 font-bold uppercase mb-1">还需碳水</p><p id="gap-carb" class="font-black text-xs text-emerald-600">0g</p></div>
                    <div class="text-center"><p class="text-[8px] text-slate-400 font-bold uppercase mb-1">还需纤维</p><p id="gap-fib" class="font-black text-xs text-orange-600">0g</p></div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">今日已吃清单</p>
                <div id="food-history"></div>
            </div>
        </section>

        <section id="tab-add" class="tab-content hidden space-y-4">
            <h2 class="text-2xl font-black italic uppercase px-2">Log Intake</h2>
            <button onclick="document.getElementById('cameraInput').click()" class="w-full bg-white p-12 rounded-[2.5rem] border-2 border-dashed border-slate-200 flex flex-col items-center">
                <span class="text-4xl mb-2">📸</span>
                <p class="font-bold text-slate-400 text-[10px] uppercase">拍照估算卡路里</p>
            </button>
            <div class="bg-white p-8 rounded-[3rem] space-y-4">
                <p class="text-[10px] font-black text-center text-slate-400 uppercase">手动输入克数</p>
                <input id="m-name" type="text" placeholder="食物名称 (如: 煎蛋)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm">
                <input id="m-weight" type="number" placeholder="重量 (克)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm">
                <button onclick="window.processIntake(document.getElementById('m-name').value, document.getElementById('m-weight').value)" class="w-full bg-black text-white p-5 rounded-2xl font-black uppercase text-xs tracking-widest">AI 计算并保存</button>
            </div>
        </section>

        <section id="tab-stats" class="tab-content hidden space-y-4">
            <h2 class="text-2xl font-black italic uppercase px-2">Body Status</h2>
            <div class="bg-white p-8 rounded-[3rem] space-y-6">
                <div class="flex justify-between items-center"><span class="font-bold text-sm">当前体重 (KG)</span><input type="number" value="60.8" class="w-16 bg-slate-50 p-2 rounded-xl text-right font-black"></div>
                <div class="grid grid-cols-2 gap-4 border-t pt-6 text-center">
                    <div><p class="text-[10px] text-slate-400 font-bold uppercase">BMI 指数</p><p class="text-xl font-black">22.3</p></div>
                    <div><p class="text-[10px] text-slate-400 font-bold uppercase">基础代谢</p><p class="text-xl font-black">1350</p></div>
                </div>
                <div class="space-y-4 border-t pt-6">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-2">围度记录 (CM)</p>
                    <div class="flex justify-between text-xs font-bold"><span>腰围 / 臀围</span><span class="text-slate-400">68 / 92</span></div>
                    <div class="flex justify-between text-xs font-bold"><span>肩膀 / 腿围</span><span class="text-slate-400">100 / 52</span></div>
                </div>
            </div>
        </section>

        <section id="tab-health" class="tab-content hidden space-y-4">
            <div class="bg-black text-white p-10 rounded-[3rem] text-center space-y-6">
                <div class="w-16 h-16 bg-red-500 rounded-2xl mx-auto flex items-center justify-center text-3xl shadow-[0_0_20px_rgba(239,68,68,0.5)]">❤️</div>
                <div>
                    <p class="text-4xl font-black tracking-tighter italic">2480</p>
                    <p class="text-[10px] font-bold opacity-40 uppercase tracking-widest">今日总消耗 (Apple Health)</p>
                </div>
                <div class="pt-6 border-t border-white/10">
                    <p class="text-emerald-400 font-black text-2xl">- 887 KCAL</p>
                    <p class="text-[10px] font-bold opacity-40 uppercase">当前热量赤字</p>
                </div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-8 left-8 right-8 h-20 bg-white/90 backdrop-blur-xl rounded-full shadow-2xl flex items-center justify-around px-4 border border-white/50 z-40">
        <button onclick="showTab('home')" class="p-4 grayscale hover:grayscale-0 transition-all">🏠</button>
        <button onclick="showTab('add')" class="p-4 grayscale hover:grayscale-0 transition-all">➕</button>
        <button onclick="showTab('stats')" class="p-4 grayscale hover:grayscale-0 transition-all">📏</button>
        <button onclick="showTab('health')" class="p-4 grayscale hover:grayscale-0 transition-all">❤️</button>
    </nav>

    <input type="file" id="cameraInput" accept="image/*" capture="camera" class="hidden" onchange="window.handleImage(this.files[0])">
</body>
</html>
