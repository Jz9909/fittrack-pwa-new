<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FitTrack PWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="/manifest.json">
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-20">
    <div class="p-6 pt-12">
        <h1 class="text-3xl font-bold tracking-tight">今日概览</h1>
        <p class="text-gray-500">坚持住，离目标还差一步</p>
    </div>

    <div class="mx-6 p-6 bg-blue-600 rounded-3xl text-white shadow-xl shadow-blue-200">
        <div class="flex justify-between items-end">
            <div>
                <p class="text-blue-100 text-sm">剩余可摄入</p>
                <p class="text-5xl font-black mt-1">1250</p>
            </div>
            <div class="text-right">
                <p class="text-blue-100 text-xs">TDEE: 2400</p>
                <p class="text-blue-100 text-xs text-opacity-80">赤字目标: -500</p>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-3 gap-4 mx-6 mt-6">
        <div class="glass p-4 rounded-2xl border border-gray-100 text-center">
            <p class="text-[10px] uppercase text-gray-400 font-bold">蛋白质</p>
            <p class="text-lg font-bold">85g</p>
        </div>
        <div class="glass p-4 rounded-2xl border border-gray-100 text-center">
            <p class="text-[10px] uppercase text-gray-400 font-bold">碳水</p>
            <p class="text-lg font-bold">120g</p>
        </div>
        <div class="glass p-4 rounded-2xl border border-gray-100 text-center">
            <p class="text-[10px] uppercase text-gray-400 font-bold">运动</p>
            <p class="text-lg font-bold text-orange-500">+350</p>
        </div>
    </div>

    <div class="fixed bottom-0 w-full glass border-t border-gray-100 px-6 py-4 flex justify-around">
        <button class="flex flex-col items-center text-blue-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 text-sm font-medium mt-1">首页</p>
        </button>
        <button onclick="alert('调起相机识别...')" class="bg-black text-white p-4 rounded-full -mt-10 shadow-lg">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        </button>
        <button class="flex flex-col items-center text-gray-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <p class="text-sm mt-1">设置</p>
        </button>
    </div>
</body>
</html>
