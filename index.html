<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SvelteFit Elite Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, where, Timestamp, deleteDoc, doc, orderBy } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5JAln13HRfqCo-SvWxrS0wCv6b1bKYG8",
            authDomain: "fitnessjz.firebaseapp.com",
            projectId: "fitnessjz",
            storageBucket: "fitnessjz.firebasestorage.app",
            messagingSenderId: "740422822580",
            appId: "1:740422822580:web:5efe6acaa89b697a71c5e1",
            measurementId: "G-7L6XCFEM4T"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const GEMINI_API_KEY = "AIzaSyAqIAwLbRy8J_TWeMESBF3z_MoWij_LYwA";

        const STATE = {
            goals: { cal: 1593, pro: 97, fat: 45, carb: 160 },
            lastPeriodStart: "2026-03-01", // 请修改为你真实的上次经期开始日
            selectedDate: new Date().toLocaleDateString()
        };

        // --- 1. 月经周期算法 (更详细版) ---
        function getCycleDetail() {
            const start = new Date(STATE.lastPeriodStart);
            const today = new Date();
            const dayIdx = Math.floor((today - start) / (86400000)) % 28 + 1;
            
            if (dayIdx <= 5) return { stage: "月经期", icon: "🩸", advice: "补铁补血，不宜剧烈运动，保持温暖。", p: "1.0x", color: "bg-red-500" };
            if (dayIdx <= 13) return { stage: "卵泡期", icon: "🌱", advice: "代谢最高峰！适合高强度力量训练，燃脂效率极高。", p: "1.2x", color: "bg-emerald-500" };
            if (dayIdx <= 16) return { stage: "排卵期", icon: "🥚", advice: "体温升高，代谢平稳，适合瑜伽或慢跑。", p: "1.1x", color: "bg-pink-500" };
            return { stage: "黄体期", icon: "🍂", advice: "易水肿/焦虑，多吃纤维，减少咖啡因，增加慢碳。", p: "0.9x", color: "bg-orange-500" };
        }

        // --- 2. 核心监听与日期展开 (界面1) ---
        function initApp() {
            const q = query(collection(db, "daily_logs"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                const groups = {};
                snapshot.forEach(fbDoc => {
                    const data = fbDoc.data();
                    const d = data.timestamp.toDate().toLocaleDateString();
                    if (!groups[d]) groups[d] = { logs: [], total: { cal:0, pro:0, fat:0, car:0 } };
                    groups[d].logs.push({ id: fbDoc.id, ...data });
                    groups[d].total.cal += Number(data.cal || 0);
                    groups[d].total.pro += Number(data.pro || 0);
                    groups[d].total.fat += Number(data.fat || 0);
                    groups[d].total.car += Number(data.car || 0);
                });
                renderHistory(groups);
                renderDashboard(groups[new Date().toLocaleDateString()] || { total: { cal:0, pro:0, fat:0, car:0 } });
            });
        }

        function renderDashboard(today) {
            const cycle = getCycleDetail();
            document.getElementById('dash-cycle').innerHTML = `<span>${cycle.icon} ${cycle.stage}</span> <span class="opacity-50 text-[8px] font-normal">${cycle.advice}</span>`;
            document.getElementById('dash-cycle-tag').className = `${cycle.color} text-white px-3 py-1 rounded-full text-[10px] font-black uppercase`;
            document.getElementById('dash-cycle-tag').innerText = cycle.stage;

            // 进度条与数值
            document.getElementById('dash-cal').innerText = Math.round(today.total.cal);
            document.getElementById('dash-pro').innerText = Math.round(today.total.pro) + "g";
            document.getElementById('dash-fat').innerText = Math.round(today.total.fat) + "g";
            document.getElementById('dash-car').innerText = Math.round(today.total.car) + "g";
        }

        function renderHistory(groups) {
            let html = "";
            Object.keys(groups).forEach(date => {
                const g = groups[date];
                const isSelected = date === STATE.selectedDate;
                html += `
                    <div class="mb-4 bg-white rounded-[2rem] overflow-hidden shadow-sm border ${isSelected ? 'border-black' : 'border-transparent'}">
                        <div onclick="window.selectDate('${date}')" class="p-5 flex justify-between items-center cursor-pointer">
                            <span class="font-black text-sm uppercase">${date === new Date().toLocaleDateString() ? 'Today' : date}</span>
                            <span class="text-xs font-bold bg-slate-100 px-3 py-1 rounded-full text-slate-500">${Math.round(g.total.cal)} kcal</span>
                        </div>
                        <div class="${isSelected ? 'block' : 'hidden'} px-5 pb-5 space-y-2 border-t border-slate-50 pt-4">
                            ${g.logs.map(l => `
                                <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                                    <div class="flex-1">
                                        <p class="text-[10px] font-black uppercase">${l.name}</p>
                                        <div class="flex gap-2 text-[8px] font-bold text-slate-400">
                                            <span>P: ${l.pro}</span><span>F: ${l.fat}</span><span>C: ${l.car}</span>
                                        </div>
                                    </div>
                                    <div class="text-right flex items-center gap-3">
                                        <span class="text-[10px] font-black">${l.cal}</span>
                                        <button onclick="window.deleteLog('${l.id}')" class="text-red-300 font-bold text-[10px]">✕</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            });
            document.getElementById('history-list').innerHTML = html;
        }

        window.selectDate = (date) => { STATE.selectedDate = date; initApp(); };
        window.deleteLog = async (id) => { if(confirm("删除记录？")) await deleteDoc(doc(db, "daily_logs", id)); };

        // --- 3. 修复 AI 识别逻辑 ---
        window.processIntake = async (mode, data) => {
            document.getElementById('loading').classList.remove('hidden');
            let payload = {};

            try {
                if (mode === 'ai_text' || mode === 'ai_img') {
                    // 修正后的 API 路径与模型名
                    const prompt = mode === 'ai_text' 
                        ? `计算营养：${data.weight}g ${data.name}，烹饪方式：${data.cook}。务必精准参考品牌数据。返回纯JSON:{"name":"${data.name}","cal":100,"pro":10,"fat":5,"car":20}`
                        : `分析图中食物。返回纯JSON:{"name":"食物","cal":100,"pro":10,"fat":5,"car":20}`;

                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, data.img ? { inline_data: { mime_type: "image/jpeg", data: data.img } } : null].filter(Boolean) }] })
                    });
                    
                    const resJson = await res.json();
                    if(resJson.error) throw new Error(resJson.error.message);

                    const aiText = resJson.candidates[0].content.parts[0].text.replace(/```json|```/gi, "").trim();
                    payload = JSON.parse(aiText);
                } else if (mode === 'macro') {
                    payload = { name: data.name, pro: data.p, fat: data.f, car: data.c, cal: (data.p*4 + data.f*9 + data.c*4) };
                }

                await addDoc(collection(db, "daily_logs"), { ...payload, timestamp: Timestamp.now() });
                window.showTab('home');
            } catch (e) {
                alert("AI 识别失败: " + e.message + "。已为你切换至手动录入。");
                console.error(e);
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        };

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
        };

        window.onload = () => { initApp(); };
    </script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); }
        input, select { -webkit-appearance: none; border-radius: 1rem; }
    </style>
</head>
<body class="bg-[#F2F2F7] text-slate-900 pb-32">

    <div id="loading" class="hidden fixed inset-0 z-[100] bg-black/60 backdrop-blur flex items-center justify-center text-white font-black italic">AI PROCESSING...</div>

    <main class="max-w-md mx-auto p-6 pt-12">
        
        <section id="tab-dash" class="tab-content space-y-6">
            <div class="flex justify-between items-center">
                <h1 class="text-4xl font-black italic tracking-tighter italic uppercase text-black">Elite.</h1>
                <div id="dash-cycle-tag"></div>
            </div>

            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm flex items-center gap-4">
                <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-2xl">💡</div>
                <p id="dash-cycle" class="text-[10px] font-bold leading-relaxed"></p>
            </div>

            <div class="bg-black text-white p-10 rounded-[3.5rem] shadow-2xl relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-[10px] font-bold opacity-40 uppercase tracking-[0.2em] mb-2">Total Consumed</p>
                    <div class="flex items-baseline gap-2">
                        <span id="dash-cal" class="text-7xl font-black tracking-tighter">0</span>
                        <span class="opacity-30 font-bold text-sm uppercase italic">kcal</span>
                    </div>
                    <div class="mt-8 grid grid-cols-3 gap-2 border-t border-white/10 pt-8">
                        <div><p class="text-[8px] opacity-40 font-black uppercase mb-1">Protein</p><p id="dash-pro" class="text-sm font-black text-blue-400">0g</p></div>
                        <div><p class="text-[8px] opacity-40 font-black uppercase mb-1">Fat</p><p id="dash-fat" class="text-sm font-black text-orange-400">0g</p></div>
                        <div><p class="text-[8px] opacity-40 font-black uppercase mb-1">Carb</p><p id="dash-car" class="text-sm font-black text-emerald-400">0g</p></div>
                    </div>
                </div>
                <div class="absolute -right-10 -top-10 w-40 h-40 bg-white/5 rounded-full blur-3xl"></div>
            </div>
        </section>

        <section id="tab-home" class="tab-content hidden space-y-4">
            <h2 class="text-2xl font-black italic uppercase italic px-2">History</h2>
            <div id="history-list"></div>
        </section>

        <section id="tab-add" class="tab-content hidden space-y-4">
            <h2 class="text-2xl font-black italic uppercase italic px-2">Log Intake</h2>
            <div class="grid grid-cols-2 gap-4">
                <div onclick="document.getElementById('fileIn').click()" class="bg-white p-8 rounded-[2.5rem] text-center space-y-2 cursor-pointer border-2 border-dashed border-slate-200">
                    <span class="text-3xl">📸</span>
                    <p class="text-[8px] font-black text-slate-400 uppercase">AI Photo</p>
                </div>
                <div onclick="showTab('add-macro')" class="bg-white p-8 rounded-[2.5rem] text-center space-y-2 cursor-pointer">
                    <span class="text-3xl">⚖️</span>
                    <p class="text-[8px] font-black text-slate-400 uppercase">Macros</p>
                </div>
            </div>

            <div class="bg-white p-8 rounded-[3rem] space-y-5 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 text-center uppercase tracking-widest">Weight & Cook Mode</p>
                <input id="in-name" type="text" placeholder="食物: 蛋白粉 / 煎牛肉" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-black text-sm">
                <input id="in-weight" type="number" placeholder="重量 (g)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-black text-sm">
                <select id="in-cook" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-black text-sm text-slate-400">
                    <option value="生重/干重">生重/干重 (如粉末/生肉)</option>
                    <option value="油炸/炒">油炸 / 炒</option>
                    <option value="清蒸/煮">清蒸 / 煮</option>
                </select>
                <button onclick="window.processIntake('ai_text', {name: document.getElementById('in-name').value, weight: document.getElementById('in-weight').value, cook: document.getElementById('in-cook').value})" class="w-full bg-black text-white p-5 rounded-2xl font-black uppercase text-xs tracking-widest">AI 精准计算</button>
            </div>
        </section>

        <section id="tab-add-macro" class="tab-content hidden space-y-4">
            <div class="bg-white p-8 rounded-[3rem] space-y-4 shadow-sm">
                <h3 class="text-center font-black uppercase text-[10px] mb-4">Manual Macros (P/F/C)</h3>
                <input id="ma-name" type="text" placeholder="食物名称" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-black text-sm">
                <div class="grid grid-cols-3 gap-2">
                    <input id="ma-p" type="number" placeholder="P" class="p-4 bg-slate-50 rounded-2xl text-center font-black">
                    <input id="ma-f" type="number" placeholder="F" class="p-4 bg-slate-50 rounded-2xl text-center font-black">
                    <input id="ma-c" type="number" placeholder="C" class="p-4 bg-slate-50 rounded-2xl text-center font-black">
                </div>
                <button onclick="window.processIntake('macro', {name: document.getElementById('ma-name').value, p: document.getElementById('ma-p').value, f: document.getElementById('ma-f').value, c: document.getElementById('ma-c').value})" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black uppercase text-xs">直接存入</button>
                <button onclick="showTab('add')" class="w-full text-[8px] font-black text-slate-300 uppercase">Back</button>
            </div>
        </section>

        <section id="tab-health" class="tab-content hidden space-y-6">
            <h2 class="text-2xl font-black italic uppercase italic px-2">Activity</h2>
            <div class="bg-white p-10 rounded-[3.5rem] text-center space-y-6">
                <div class="space-y-2">
                    <p class="text-5xl font-black italic tracking-tighter">REST DAY</p>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">目前状态: 恢复中</p>
                </div>
                <div class="bg-emerald-50 p-6 rounded-[2rem]">
                    <p class="text-2xl font-black text-emerald-600">2,480 kcal</p>
                    <p class="text-[10px] font-bold text-emerald-600/50 uppercase">今日预估总消耗</p>
                </div>
                <button class="w-full py-4 rounded-2xl border-2 border-black font-black uppercase text-[10px] tracking-widest">手动输入运动数据</button>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-8 left-8 right-8 h-20 bg-white/80 backdrop-blur-xl rounded-full shadow-2xl flex items-center justify-around px-4 z-50 border border-white/50">
        <button onclick="showTab('dash')" class="p-4">📊</button>
        <button onclick="showTab('home')" class="p-4">📅</button>
        <button onclick="showTab('add')" class="p-4 bg-black text-white rounded-full w-12 h-12 flex items-center justify-center shadow-lg">➕</button>
        <button onclick="showTab('health')" class="p-4">🏃</button>
        <button onclick="showTab('dash')" class="p-4 opacity-20">⚙️</button>
    </nav>

    <input type="file" id="fileIn" accept="image/*" capture="camera" class="hidden" onchange="const r=new FileReader();r.readAsDataURL(this.files[0]);r.onload=()=>window.processIntake('ai_img',{img:r.result.split(',')[1]})">
</body>
</html>
