<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SvelteFit AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, where, Timestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5JAln13HRfqCo-SvWxrS0wCv6b1bKYG8",
            authDomain: "fitnessjz.firebaseapp.com",
            projectId: "fitnessjz",
            storageBucket: "fitnessjz.firebasestorage.app",
            messagingSenderId: "740422822580",
            appId: "1:740422822580:web:5efe6acaa89b697a71c5e1",
            measurementId: "G-7L6XCFEM4T"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const GEMINI_API_KEY = "AIzaSyAqIAwLbRy8J_TWeMESBF3z_MoWij_LYwA";

        const GOALS = { targetCal: 1593, targetPro: 97, targetCarb: 160, targetFiber: 25 };

        // --- 修复点：移除 orderBy，确保空数据库也能读取 ---
        function initDashboard() {
            const startOfToday = new Date();
            startOfToday.setHours(0,0,0,0);

            const q = query(
                collection(db, "daily_logs"), 
                where("timestamp", ">=", Timestamp.fromDate(startOfToday))
            );

            onSnapshot(q, (snapshot) => {
                let totalCal = 0;
                let listHtml = "";
                
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    totalCal += Number(data.cal || 0);
                    listHtml += `
                        <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl mb-2">
                            <span class="font-bold text-sm">${data.name}</span>
                            <span class="font-black text-sm">${data.cal} kcal</span>
                        </div>`;
                });

                document.getElementById('main-cal').innerText = Math.max(0, GOALS.targetCal - totalCal);
                document.getElementById('food-list').innerHTML = listHtml || "<p class='text-slate-300 text-xs text-center py-10'>尚未记录今日饮食</p>";
            });
        }

        // --- 这就是你要找的 saveIntake 逻辑 ---
        window.saveIntake = async (name, weight, isImage = false, base64 = null) => {
            document.body.style.opacity = "0.5";
            
            // 构造 AI 提示词：要求它根据克数计算
            let prompt = isImage 
                ? "分析图中食物，给出热量(kcal)。只返回JSON:{\"name\":\"名\",\"cal\":100,\"pro\":10,\"car\":10,\"fib\":2}"
                : `计算食物：${name}，重量：${weight}克。给出热量(kcal)。只返回JSON:{"name":"${name}","cal":123,"pro":10,"car":20,"fib":5}`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, isImage ? { inline_data: { mime_type: "image/jpeg", data: base64 } } : null].filter(Boolean) }]
                    })
                });
                
                const data = await res.json();
                const resultText = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
                const result = JSON.parse(resultText);
                
                // 存入 Firebase
                await addDoc(collection(db, "daily_logs"), { 
                    ...result, 
                    timestamp: Timestamp.now() 
                });
                
                window.showTab('home');
            } catch (e) {
                console.error(e);
                alert("AI识别或数据库保存失败。请检查：1.Firebase Rules是否Publish 2.网络环境");
            } finally {
                document.body.style.opacity = "1";
            }
        };

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
        };

        window.handleManual = () => {
            const name = document.getElementById('m-name').value;
            const weight = document.getElementById('m-weight').value;
            if(!name || !weight) return alert("请填写食物和克数");
            window.saveIntake(name, weight);
        };

        window.onload = () => { initDashboard(); };
    </script>
</head>
<body class="bg-[#F2F2F7] text-black">
    <main class="max-w-md mx-auto p-6 pt-16 pb-32">
        <section id="tab-home" class="tab-content space-y-6">
            <div class="bg-white p-8 rounded-[3rem] shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">今日剩余热量</p>
                <div class="flex items-baseline gap-1 mt-1">
                    <span id="main-cal" class="text-7xl font-black tracking-tighter">1593</span>
                    <span class="text-slate-300 font-bold text-xs uppercase">kcal</span>
                </div>
            </div>
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">今日摄入明细</p>
                <div id="food-list" class="space-y-1"></div>
            </div>
        </section>

        <section id="tab-add" class="tab-content hidden space-y-4">
            <div class="bg-white p-8 rounded-[2.5rem] space-y-5">
                <input id="m-name" type="text" placeholder="食物名称 (如: 苹果)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold">
                <input id="m-weight" type="number" placeholder="重量 (克)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold">
                <button onclick="handleManual()" class="w-full bg-black text-white p-5 rounded-2xl font-black uppercase tracking-widest">计算并保存</button>
            </div>
        </section>

        <nav class="fixed bottom-10 left-8 right-8 h-18 bg-white rounded-full shadow-2xl flex items-center justify-around">
            <button onclick="showTab('home')" class="p-4 text-black">🏠</button>
            <button onclick="showTab('add')" class="p-4 text-slate-300">➕</button>
        </nav>
    </main>
</body>
</html>
