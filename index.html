<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SvelteFit AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, where, Timestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5JAln13HRfqCo-SvWxrS0wCv6b1bKYG8",
            authDomain: "fitnessjz.firebaseapp.com",
            projectId: "fitnessjz",
            storageBucket: "fitnessjz.firebasestorage.app",
            messagingSenderId: "740422822580",
            appId: "1:740422822580:web:5efe6acaa89b697a71c5e1",
            measurementId: "G-7L6XCFEM4T"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const GEMINI_API_KEY = "AIzaSyAqIAwLbRy8J_TWeMESBF3z_MoWij_LYwA";

        const GOALS = { targetCal: 1593 };

        // 1. 首页实时监听
        function initDashboard() {
            const startOfToday = new Date();
            startOfToday.setHours(0,0,0,0);
            const q = query(collection(db, "daily_logs"), where("timestamp", ">=", Timestamp.fromDate(startOfToday)));

            onSnapshot(q, (snapshot) => {
                let totalCal = 0;
                let listHtml = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    totalCal += Number(data.cal || 0);
                    listHtml += `<div class="flex justify-between p-4 bg-slate-50 rounded-2xl mb-2 font-bold text-sm"><span>${data.name}</span><span>${data.cal} kcal</span></div>`;
                });
                document.getElementById('main-cal').innerText = Math.max(0, GOALS.targetCal - totalCal);
                document.getElementById('food-list').innerHTML = listHtml || "<p class='text-slate-300 text-center py-10'>暂无记录</p>";
            });
        }

        // 2. 保存逻辑 (带自动降级功能)
        window.saveIntake = async (name, weight) => {
            const btn = document.getElementById('save-btn');
            btn.innerText = "正在计算...";
            btn.disabled = true;

            let result = { name: name, cal: Math.round(weight * 1.5), timestamp: Timestamp.now() }; // 默认保底逻辑

            try {
                // 尝试调用 Gemini AI
                const prompt = `计算食物：${name}，重量：${weight}克。只返回JSON:{"name":"${name}","cal":123}`;
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                if (res.ok) {
                    const data = await res.json();
                    const aiText = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
                    const aiResult = JSON.parse(aiText);
                    result.cal = aiResult.cal;
                    console.log("AI 计算成功");
                }
            } catch (err) {
                console.warn("AI 联网失败，已切换至本地估算模式");
            }

            try {
                // 存入 Firebase
                await addDoc(collection(db, "daily_logs"), {
                    ...result,
                    timestamp: Timestamp.now()
                });
                window.showTab('home');
            } catch (e) {
                alert("数据库写入失败！请确认 Firebase Rules 是否点击了蓝色的 PUBLISH 按钮。");
                console.error(e);
            } finally {
                btn.innerText = "计算并保存";
                btn.disabled = false;
            }
        };

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
        };

        window.handleManual = () => {
            const n = document.getElementById('m-name').value;
            const w = document.getElementById('m-weight').value;
            if(!n || !w) return alert("请完整填写信息");
            window.saveIntake(n, w);
        };

        window.onload = () => { initDashboard(); };
    </script>
</head>
<body class="bg-[#F2F2F7] text-black p-6">
    <main class="max-w-md mx-auto">
        <section id="tab-home" class="tab-content space-y-6">
            <h1 class="text-2xl font-black italic">STATUS</h1>
            <div class="bg-white p-8 rounded-[3rem] shadow-sm text-center">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-2">Remaining</p>
                <span id="main-cal" class="text-7xl font-black tracking-tighter">1593</span>
            </div>
            <div class="bg-white p-6 rounded-[2.5rem]">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-4">Today's Log</p>
                <div id="food-list"></div>
            </div>
        </section>

        <section id="tab-add" class="tab-content hidden space-y-4">
            <h2 class="text-2xl font-black italic">ADD FOOD</h2>
            <div class="bg-white p-8 rounded-[2.5rem] space-y-4">
                <input id="m-name" type="text" placeholder="食物 (如: 鸡蛋)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm">
                <input id="m-weight" type="number" placeholder="重量 (克)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm">
                <button id="save-btn" onclick="handleManual()" class="w-full bg-black text-white p-5 rounded-2xl font-black uppercase text-xs">计算并保存</button>
            </div>
        </section>

        <nav class="fixed bottom-10 left-8 right-8 h-18 bg-white/90 backdrop-blur rounded-full shadow-2xl flex justify-around items-center">
            <button onclick="showTab('home')" class="p-4 text-xl">🏠</button>
            <button onclick="showTab('add')" class="p-4 text-xl text-slate-300">➕</button>
        </nav>
    </main>
</body>
</html>
