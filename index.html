        const app = initializeApp(firebaseConfig);

        // 2. 【在这里填入你的 Gemini API Key】
        const GEMINI_API_KEY = "AIzaSyAqIAwLbRy8J_TWeMESBF3z_MoWij_LYwA";

        // 核心逻辑：拍照并调用 Gemini
        window.identifyFood = async (file) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64Data = reader.result.split(',')[1];
                const prompt = "分析这张照片中的食物或营养标签，估算热量(kcal)、蛋白质(g)、碳水(g)。只返回JSON格式，如: {\"name\":\"食物名\",\"cal\":200,\"pro\":15,\"car\":25}";
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: base64Data } }] }]
                        })
                    });
                    const data = await response.json();
                    const text = data.candidates[0].content.parts[0].text;
                    const foodInfo = JSON.parse(text.replace(/```json|```/g, ""));
                    
                    // 自动存入 Firebase
                    await addDoc(collection(db, "meals"), {
                        ...foodInfo,
                        timestamp: new Date()
                    });
                    alert(`识别成功: ${foodInfo.name}, ${foodInfo.cal}kcal! 数据已同步云端。`);
                } catch (e) {
                    alert("识别失败，请检查 API Key 或网络");
                }
            };
        };
    </script>
