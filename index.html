<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SvelteFit Ultra Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, where, Timestamp, deleteDoc, doc, orderBy } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5JAln13HRfqCo-SvWxrS0wCv6b1bKYG8",
            authDomain: "fitnessjz.firebaseapp.com",
            projectId: "fitnessjz",
            storageBucket: "fitnessjz.firebasestorage.app",
            messagingSenderId: "740422822580",
            appId: "1:740422822580:web:5efe6acaa89b697a71c5e1",
            measurementId: "G-7L6XCFEM4T"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const GEMINI_API_KEY = "AIzaSyAqIAwLbRy8J_TWeMESBF3z_MoWij_LYwA";

        const STATE = {
            goals: { cal: 1593, pro: 97, fat: 45, carb: 160 },
            lastPeriodStart: "2026-03-01", 
            selectedDate: new Date().toLocaleDateString()
        };

        // --- 1. 月经周期逻辑 ---
        function getCycleInfo() {
            const start = new Date(STATE.lastPeriodStart);
            const today = new Date();
            const dayIdx = Math.floor((today - start) / 86400000) % 28 + 1;
            if (dayIdx <= 5) return { name: "月经期", icon: "🩸", tip: "补血，宜慢走", color: "bg-red-500" };
            if (dayIdx <= 13) return { name: "卵泡期", icon: "🌱", tip: "代谢高峰！燃脂举铁黄金期", color: "bg-emerald-500" };
            if (dayIdx <= 16) return { name: "排卵期", icon: "🥚", tip: "能量稳定，建议多喝水", color: "bg-pink-500" };
            return { name: "黄体期", icon: "🍂", tip: "易水肿，减少盐分摄入", color: "bg-orange-500" };
        }

        // --- 2. 核心数据监听 ---
        function initApp() {
            const q = query(collection(db, "daily_logs"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                const groups = {};
                snapshot.forEach(fbDoc => {
                    const data = fbDoc.data();
                    const d = data.timestamp.toDate().toLocaleDateString();
                    if (!groups[d]) groups[d] = { logs: [], total: { cal:0, pro:0, fat:0, car:0 }, burned: 0 };
                    if(data.cal < 0) { groups[d].burned += Math.abs(data.cal); } 
                    else {
                        groups[d].logs.push({ id: fbDoc.id, ...data });
                        groups[d].total.cal += Number(data.cal || 0);
                        groups[d].total.pro += Number(data.pro || 0);
                        groups[d].total.fat += Number(data.fat || 0);
                        groups[d].total.car += Number(data.car || 0);
                    }
                });
                renderHistory(groups);
                renderDashboard(groups[new Date().toLocaleDateString()] || { total: { cal:0, pro:0, fat:0, car:0 }, burned: 0 });
            });
        }

        function renderDashboard(today) {
            const cycle = getCycleInfo();
            document.getElementById('dash-cycle').innerText = `${cycle.icon} ${cycle.name}: ${cycle.tip}`;
            document.getElementById('dash-cycle-tag').className = `${cycle.color} text-white px-3 py-1 rounded-full text-[10px] font-black uppercase`;
            document.getElementById('dash-cycle-tag').innerText = cycle.name;
            document.getElementById('dash-cal').innerText = Math.round(today.total.cal);
            document.getElementById('dash-pro').innerText = Math.round(today.total.pro) + "g";
            document.getElementById('dash-fat').innerText = Math.round(today.total.fat) + "g";
            document.getElementById('dash-car').innerText = Math.round(today.total.car) + "g";
            document.getElementById('summary-deficit').innerText = Math.round(2480 + today.burned - today.total.cal) + " kcal";
        }

        function renderHistory(groups) {
            let html = "";
            Object.keys(groups).forEach(date => {
                const g = groups[date];
                const isSelected = date === STATE.selectedDate;
                html += `
                    <div class="mb-4 bg-white rounded-[2rem] overflow-hidden shadow-sm border ${isSelected ? 'border-black' : 'border-transparent'}">
                        <div onclick="window.selectDate('${date}')" class="p-6 flex justify-between items-center cursor-pointer">
                            <span class="font-black text-[10px] uppercase text-slate-400">${date === new Date().toLocaleDateString() ? 'TODAY' : date}</span>
                            <span class="font-black text-sm">${Math.round(g.total.cal)} KCAL</span>
                        </div>
                        <div class="${isSelected ? 'block' : 'hidden'} px-6 pb-6 space-y-2 border-t border-slate-50 pt-4">
                            ${g.logs.map(l => `
                                <div class="flex justify-between items-center p-3 bg-slate-50 rounded-2xl">
                                    <div class="flex-1 text-[10px] font-bold uppercase">
                                        <p>${l.name}</p>
                                        <p class="text-[8px] opacity-40">P:${l.pro} F:${l.fat} C:${l.car}</p>
                                    </div>
                                    <span class="font-black text-[10px] mx-3">${l.cal}</span>
                                    <button onclick="window.deleteLog('${l.id}')" class="text-red-300 font-bold text-xs">✕</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            });
            document.getElementById('history-list').innerHTML = html;
        }

        // --- 3. 终极 AI 修复逻辑：切换至 v1beta 并补全模型路径 ---
window.processIntake = async (mode, data) => {
    document.getElementById('loading').classList.remove('hidden');
    
    // ---------------------------------------------------------
    // 1. 超强本地语义库 (AI 休息时的“大脑”)
    // ---------------------------------------------------------
    const smartDB = [
        { key: ["粉", "蛋白粉", "myprotein"], cal: 400, pro: 80, fat: 5, car: 10, unit: 100 }, // 每100g计
        { key: ["鸡胸", "鸡肉"], cal: 130, pro: 24, fat: 3, car: 0, unit: 100 },
        { key: ["蛋", "鸡蛋"], cal: 150, pro: 13, fat: 10, car: 1, unit: 100 },
        { key: ["牛", "牛肉"], cal: 250, pro: 26, fat: 15, car: 0, unit: 100 },
        { key: ["米饭", "饭"], cal: 116, pro: 2.6, fat: 0.3, car: 26, unit: 100 }
    ];

    let payload = null;

    // 尝试先进行本地匹配
    if (data.name) {
        const match = smartDB.find(item => item.key.some(k => data.name.toLowerCase().includes(k)));
        if (match) {
            const ratio = (data.weight || 100) / match.unit;
            payload = {
                name: "🎯 " + data.name,
                cal: Math.round(match.cal * ratio),
                pro: (match.pro * ratio).toFixed(1),
                fat: (match.fat * ratio).toFixed(1),
                car: (match.car * ratio).toFixed(1)
            };
        }
    }

    try {
        // 如果是手动录入宏量元素，直接跳过 AI
        if (mode === 'macro') {
            payload = { name: data.name, pro: data.p, fat: data.f, car: data.c, cal: (data.p*4 + data.f*9 + data.c*4) };
        } 
        // 只有在没匹配到本地库或者强制 AI 识别时才发起请求
        else if ((mode === 'ai_text' || mode === 'ai_img') && !payload) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
            const prompt = `食物:${data.name},重量:${data.weight}g,烹饪:${data.cook}。返回纯JSON:{"name":"${data.name}","cal":100,"pro":10,"fat":5,"car":20}`;
            
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, data.img ? { inline_data: { mime_type: "image/jpeg", data: data.img } } : null].filter(Boolean) }] })
            });
            const resJson = await res.json();
            const aiRaw = resJson.candidates[0].content.parts[0].text.replace(/```json|```/gi, "").trim();
            payload = JSON.parse(aiRaw);
        }

        if (!payload) throw new Error("No Data");

        await addDoc(collection(db, "daily_logs"), { ...payload, timestamp: Timestamp.now() });
        window.showTab('dash');

    } catch (e) {
        // 最后的保底计算 (基础热量系数)
        if (!payload) {
            payload = { name: "📝 " + data.name, cal: (data.weight || 100) * 1.5, pro: 10, fat: 5, car: 20 };
            await addDoc(collection(db, "daily_logs"), { ...payload, timestamp: Timestamp.now() });
            alert("AI 暂时休息，已通过保底系数存入数据。");
        }
        window.showTab('dash');
    } finally {
        document.getElementById('loading').classList.add('hidden');
    }
};

        window.selectDate = (date) => { STATE.selectedDate = date; initApp(); };
        window.deleteLog = async (id) => { if(confirm("删除此项？")) await deleteDoc(doc(db, "daily_logs", id)); };
        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
        };

        window.onload = () => { initApp(); };
    </script>
</head>
<body class="bg-[#F2F2F7] text-slate-900 pb-36 font-sans">

    <div id="loading" class="hidden fixed inset-0 z-[100] bg-white/90 backdrop-blur flex items-center justify-center font-black italic tracking-tighter">PROCESSING...</div>

    <main class="max-w-md mx-auto p-6 pt-12">
        
        <section id="tab-dash" class="tab-content space-y-6">
            <header class="flex justify-between items-center">
                <h1 class="text-4xl font-black italic tracking-tighter uppercase italic">SvelteFit.</h1>
                <div id="dash-cycle-tag"></div>
            </header>

            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm flex items-center gap-4">
                <div class="w-10 h-10 bg-slate-50 rounded-2xl flex items-center justify-center text-xl">💡</div>
                <p id="dash-cycle" class="text-[10px] font-bold leading-tight"></p>
            </div>

            <div class="bg-black text-white p-10 rounded-[3.5rem] shadow-2xl relative overflow-hidden">
                <p class="text-[10px] font-bold opacity-30 uppercase tracking-[0.2em] mb-1">Daily Intake</p>
                <div class="flex items-baseline gap-2">
                    <span id="dash-cal" class="text-7xl font-black tracking-tighter">0</span>
                    <span class="opacity-20 font-bold text-sm uppercase">kcal</span>
                </div>
                <div class="mt-10 grid grid-cols-3 gap-2 border-t border-white/10 pt-8">
                    <div><p class="text-[8px] opacity-30 font-black uppercase mb-1">PRO</p><p id="dash-pro" class="text-sm font-black text-blue-400">0g</p></div>
                    <div><p class="text-[8px] opacity-30 font-black uppercase mb-1">FAT</p><p id="dash-fat" class="text-sm font-black text-orange-400">0g</p></div>
                    <div><p class="text-[8px] opacity-30 font-black uppercase mb-1">CARB</p><p id="dash-car" class="text-sm font-black text-emerald-400">0g</p></div>
                </div>
            </div>

            <div class="bg-emerald-500 text-white p-8 rounded-[2.5rem] shadow-lg shadow-emerald-200/50">
                <p class="text-[10px] font-black opacity-60 uppercase mb-1 text-center">Net Deficit (今日净赤字)</p>
                <p id="summary-deficit" class="text-4xl font-black italic tracking-tighter text-center">0 kcal</p>
            </div>
        </section>

        <section id="tab-home" class="tab-content hidden space-y-4">
            <h2 class="text-2xl font-black italic uppercase px-2">History</h2>
            <div id="history-list"></div>
        </section>

        <section id="tab-add" class="tab-content hidden space-y-4">
            <h2 class="text-2xl font-black italic uppercase px-2">Add Log</h2>
            <div class="grid grid-cols-2 gap-4">
                <div onclick="document.getElementById('fileIn').click()" class="bg-white p-8 rounded-[2.5rem] border-2 border-dashed border-slate-200 text-center cursor-pointer">
                    <span class="text-3xl">📸</span>
                    <p class="text-[8px] font-black text-slate-400 uppercase mt-2 italic">Vision AI</p>
                </div>
                <div onclick="showTab('add-macro')" class="bg-white p-8 rounded-[2.5rem] text-center cursor-pointer shadow-sm">
                    <span class="text-3xl">⚖️</span>
                    <p class="text-[8px] font-black text-slate-400 uppercase mt-2 italic">Macros</p>
                </div>
            </div>
            <div class="bg-white p-8 rounded-[3rem] space-y-4 shadow-sm">
                <input id="in-name" type="text" placeholder="食物: 蛋白粉" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm">
                <input id="in-weight" type="number" placeholder="重量 (g)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm">
                <select id="in-cook" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm text-slate-400">
                    <option value="生重/干粉">生重 / 干粉 (最准)</option>
                    <option value="油炸">油炸 / 炒</option>
                    <option value="水煮">水煮</option>
                </select>
                <button onclick="window.processIntake('ai_text', {name: document.getElementById('in-name').value, weight: document.getElementById('in-weight').value, cook: document.getElementById('in-cook').value})" class="w-full bg-black text-white p-5 rounded-2xl font-black uppercase text-xs tracking-widest">Submit to AI</button>
            </div>
        </section>

        <section id="tab-add-macro" class="tab-content hidden space-y-4">
            <div class="bg-white p-8 rounded-[3rem] shadow-sm space-y-4">
                <input id="ma-name" type="text" placeholder="食物名称" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm">
                <div class="grid grid-cols-3 gap-2 text-center font-black">
                    <div><p class="text-[8px] text-slate-300 uppercase mb-1">Pro</p><input id="ma-p" type="number" placeholder="0" class="w-full p-4 bg-slate-50 rounded-2xl text-center"></div>
                    <div><p class="text-[8px] text-slate-300 uppercase mb-1">Fat</p><input id="ma-f" type="number" placeholder="0" class="w-full p-4 bg-slate-50 rounded-2xl text-center"></div>
                    <div><p class="text-[8px] text-slate-300 uppercase mb-1">Carb</p><input id="ma-c" type="number" placeholder="0" class="w-full p-4 bg-slate-50 rounded-2xl text-center"></div>
                </div>
                <button onclick="window.processIntake('macro', {name: document.getElementById('ma-name').value, p: document.getElementById('ma-p').value, f: document.getElementById('ma-f').value, c: document.getElementById('ma-c').value})" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black uppercase text-xs">Save Macros</button>
                <button onclick="showTab('add')" class="w-full text-[10px] font-bold text-slate-300">CANCEL</button>
            </div>
        </section>

        <section id="tab-health" class="tab-content hidden space-y-4">
            <h2 class="text-2xl font-black italic uppercase px-2">Workouts</h2>
            <div class="bg-white p-8 rounded-[3rem] space-y-4 shadow-sm">
                <input id="ex-name" type="text" placeholder="运动项目: 力量训练" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm">
                <input id="ex-burn" type="number" placeholder="消耗 (kcal)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm">
                <button onclick="window.processIntake('exercise', {name: document.getElementById('ex-name').value, cal: document.getElementById('ex-burn').value})" class="w-full bg-red-500 text-white p-5 rounded-2xl font-black uppercase text-xs tracking-widest">Log Workout</button>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-8 left-8 right-8 h-20 bg-white/90 backdrop-blur-xl rounded-full shadow-2xl flex items-center justify-around px-4 z-50 border border-white/50">
        <button onclick="showTab('dash')" class="p-4">📊</button>
        <button onclick="showTab('home')" class="p-4">📅</button>
        <button onclick="showTab('add')" class="p-4 bg-black text-white rounded-full w-12 h-12 flex items-center justify-center">➕</button>
        <button onclick="showTab('health')" class="p-4">🏋️</button>
    </nav>

    <input type="file" id="fileIn" accept="image/*" capture="camera" class="hidden" onchange="const r=new FileReader();r.readAsDataURL(this.files[0]);r.onload=()=>window.processIntake('ai_img',{img:r.result.split(',')[1]})">
</body>
</html>
